name: Release Build

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write
  packages: read

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-release:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/linchpin-release-toolchain:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish .NET tools
        shell: bash
        run: |
          set -euo pipefail
          dotnet publish src/Linchpin/Linchpin.csproj -c Release -r win-x64 --self-contained false -o artifacts/publish/Linchpin
          dotnet publish src/Chisel/Chisel.csproj -c Release -r win-x64 --self-contained false -o artifacts/publish/Chisel
          dotnet publish src/LP128Pack/LP128Pack.csproj -c Release -r win-x64 --self-contained false -o artifacts/publish/C128Pack /p:AssemblyName=C128Pack

      - name: Build Atari target
        shell: bash
        run: |
          set -euo pipefail
          make -C src/LinchpinST atari-tos
          mkdir -p artifacts/native/atari
          cp src/LinchpinST/bin/LINCHST.TTP artifacts/native/atari/LINCHPIN.TTP

      - name: Build Amiga target
        shell: bash
        run: |
          set -euo pipefail
          make -C src/LinchpinST amiga
          mkdir -p artifacts/native/amiga
          cp src/LinchpinST/bin/CORNER artifacts/native/amiga/LINCHPIN

      - name: Build Commodore 128 target
        shell: bash
        run: |
          set -euo pipefail
          mos_c128_clang="$(command -v mos-c128-clang || true)"
          if [ -z "$mos_c128_clang" ]; then
            mos_c128_clang="$(find /opt/llvm-mos -path '*/bin/mos-c128-clang' -type f | head -n 1)"
          fi
          if [ -z "$mos_c128_clang" ]; then
            echo "mos-c128-clang not found in PATH or under /opt/llvm-mos" >&2
            exit 1
          fi
          make -C src/Linchpin128 c128 \
            MOS_C128_CLANG="$mos_c128_clang" \
            C128_TARGET=bin/linchpin.prg \
            LAUNCHER_PRG=bin/boot.prg \
            LAUNCHER_NAME=boot \
            PROGRAM_NAME=linchpin
          make -C src/Linchpin128 bin/boot.prg \
            MOS_C128_CLANG="$mos_c128_clang" \
            C128_TARGET=bin/linchpin.prg \
            LAUNCHER_PRG=bin/boot.prg \
            LAUNCHER_NAME=boot \
            PROGRAM_NAME=linchpin
          mkdir -p artifacts/native/c128
          cp src/Linchpin128/bin/boot.prg artifacts/native/c128/boot.prg
          cp src/Linchpin128/bin/linchpin.prg artifacts/native/c128/linchpin.prg

      - name: Package release ZIP
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/package_release.py \
            --output-dir artifacts/release \
            --zip-name "linchpin-${GITHUB_REF_NAME:-${GITHUB_RUN_NUMBER}}.zip" \
            --bin-input artifacts/publish/Linchpin \
            --bin-input artifacts/publish/Chisel \
            --bin-input artifacts/publish/C128Pack \
            --atari-binary artifacts/native/atari/LINCHPIN.TTP \
            --amiga-binary artifacts/native/amiga/LINCHPIN \
            --c128-boot artifacts/native/c128/boot.prg \
            --c128-program artifacts/native/c128/linchpin.prg \
            --sample-dir src/Chisel/examples \
            --license-file LICENSE

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: linchpin-release
          path: artifacts/release/staging
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release/*.zip
